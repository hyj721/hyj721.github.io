`dependencies`，里面包括了如下\",\"cover\":\"\"}},{\"route\":\"/backend/java/index\",\"meta\":{\"title\":\"目录\",\"date\":\"2024-06-05 21:15:32\",\"tag\":[],\"description\":\"- Java集合\\r\\n\\r\\n  - Map\\r\\n\\r\\n  - List\\r\\n\\r\\n- Java并发编程\\r\\n\\r\\n- 框架\\r\\n  - Spring\\r\\n  - MyBatis\",\"cover\":\"\"}},{\"route\":\"/backend/java/Java并发编程\",\"meta\":{\"title\":\"Java并发编程\",\"date\":\"2024-05-04 11:33:13\",\"tag\":[],\"description\":\"基础\\r\\n\\r\\n \\r\\n\\r\\n 并发和并行的区别\\r\\n\\r\\n- 并发（Concurrent）：指在同一个时间段内，两个或多个程序（或任务、事件）执行，它们在时间上有重叠，即宏观上是同时进行的，但在微观上仍然是顺序\",\"cover\":\"/assets/javathread-20240315111143.IK_gl4lJ.png\"}},{\"route\":\"/backend/java/Spring\",\"meta\":{\"title\":\"Spring\",\"date\":\"2024-05-10 15:29:03\",\"tag\":[],\"description\":\"基础\\r\\n\\r\\nSpring 是一个轻量级、非入侵式的控制反转 (IoC) 和面向切面 (AOP) 的框架。\\r\\n\\r\\n IoC\\r\\n\\r\\nIoC（控制反转，Inversion of Control）：由容器来控\",\"cover\":\"\"}},{\"route\":\"/backend/java/面向对象\",\"meta\":{\"title\":\"\",\"date\":\"2024-04-11 18:52:40\",\"tag\":[],\"description\":\"\",\"cover\":\"\"}},{\"route\":\"/csbase/network/http\",\"meta\":{\"title\":\"http常见问题总结\",\"date\":\"2024-05-11 20:08:43\",\"tag\":[],\"description\":\"HTTP基本概念\\r\\n\\r\\n HTTP是什么\\r\\n\\r\\nHTTP 是超文本传输协议，也就是HyperText Transfer Protocol。\\r\\n\\r\\nHTTP 是一个在计算机世界里专门在「两点」之间「传输\",\"cover\":\"http.assets/6-五大类HTTP状态码.png\"}},{\"route\":\"/csbase/network/index\",\"meta\":{\"title\":\"\",\"date\":\"2024-06-05 21:24:30\",\"tag\":[],\"description\":\"目录\\r\\n\\r\\n- 基础篇\\r\\n\\r\\n   - TCP/IP网络模型\\r\\n\\r\\n   - 输入url到展示网页发生了什么\\r\\n\\r\\n- HTTP篇\\r\\n  - http问题总结\\r\\n\\r\\n- TCP篇\\r\\n   -  TCP\",\"cover\":\"\"}},{\"route\":\"/csbase/network/ip基础\",\"meta\":{\"title\":\"IP\",\"date\":\"2024-06-06 10:48:00\",\"tag\":[],\"description\":\"概览\\r\\n\\r\\nIP在TCP/IP模型中位于第三层，网络层。网络层的主要作用：实现主机与主机之间的通信（点对点的通信）。IP的作用是在复杂的网络环境中，将数据包发送给最终目的地主机。\\r\\n\\r\\n\\r\\n&gt;\\r\",\"cover\":\"/assets/IP地址分类.C42g1i8l.jpg\"}},{\"route\":\"/csbase/network/TCPIP网络模型\",\"meta\":{\"title\":\"TCP/IP网络模型\",\"date\":\"2024-05-03 15:38:53\",\"tag\":[],\"description\":\"在同一台计算机的不同进程间通信，可以用到管道、消息队列、共享内存、信号量等方式；而在不同的计算机间通信，就需要用到网络通信，而设备是各种各样的，所以要兼容各种设备，就需要协商出一个通用的协议。这个协议\",\"cover\":\"/assets/TCP段.CcSZgBBr.png\"}},{\"route\":\"/csbase/network/TCP三次握手与四次挥手\",\"meta\":{\"title\":\"TCP 三次握手与四次挥手\",\"date\":\"2024-05-04 22:20:45\",\"tag\":[],\"description\":\"TCP基本认识\\r\\n\\r\\n`IP` 层是「不可靠」的，它不保证网络包的交付、不保证网络包的按序交付、也不保证网络包中的数据的完整性。TCP 是一个工作在传输层的可靠数据传输的服务，它能确保接收端接收的网络\",\"cover\":\"/assets/format_png-20230309230534096.aMYoH_Hm.png\"}},{\"route\":\"/csbase/network/输入url到展示网页发生了什么\",\"meta\":{\"title\":\"输入url到展示网页发生了什么\",\"date\":\"2024-06-05 21:28:34\",\"tag\":[],\"description\":\"时序图：\\r\\n\\r\\n\\r\\n\\r\\n\\r\\n\\r\\n 说明图：\\r\\n\\r\\n HTTP\\r\\n\\r\\n:::tip\\r\\n\\r\\n浏览器首先需要解析URL，从而生成要发送给服务器的请求消息。\\r\\n\\r\\n:::\\r\\n\\r\\n\\r\\n\\r\\n对`url`进行解析之\",\"cover\":\"/assets/WkTEQUGFjPWhW4hiK7PVBZ.Ba7BBSGD.png\"}},{\"route\":\"/csbase/os/4 内存管理\",\"meta\":{\"title\":\"4 内存管理\",\"date\":\"2024-05-02 22:22:30\",\"tag\":[],\"description\":\"4.1 为什么需要内存管理\\r\\n\\r\\n 虚拟内存\\r\\n\\r\\n场景：单片机的cpu直接操作内存的【物理地址】（因为单片机没有操作系统，不能映虚拟内存和物理内存）。这样的话，在内存中同时运行两个程序是不可以的，因\",\"cover\":\"https://yijina.oss-cn-chengdu.aliyuncs.com/img/298fb68e3da94d767b02f2ed81ebf2c4.png\"}},{\"route\":\"/csbase/os/进程\",\"meta\":{\"title\":\"\",\"date\":\"2024-04-11 20:50:46\",\"tag\":[],\"description\":\"\",\"cover\":\"\"}},{\"route\":\"/csbase/设计模式/组合模式\",\"meta\":{\"title\":\"组合模式\",\"date\":\"2024-06-06 11:12:57\",\"tag\":[],\"description\":\"案例场景模拟\\r\\n\\r\\n\\r\\n\\r\\n以上是一个非常简化版的营销规则`决策树`，根据`性别`、`年龄`来发放不同类型的优惠券，来刺激消费起到精准用户促活的目的。\\r\\n\\r\\n 实现方法\\r\\n\\r\\n 传统实现方法\\r\\n\\r\\n一\",\"cover\":\"/assets/itstack-demo-design-8-02.BGxDoSLX.png\"}},{\"route\":\"/project/OpenAI/OpenAI SDK\",\"meta\":{\"title\":\"OpenAi SDK开发\",\"date\":\"2024-05-01 14:05:56\",\"tag\":[],\"description\":\"此sdk采用了一种session会话设计，我们作为sdk的使用方，需要得到一个session，然后调用session里面的方法就可以了。\\n下面我们看一下sdk的内部设计。\\n OpenAiSession\",\"cover\":\"https://yi
